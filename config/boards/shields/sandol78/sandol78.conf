# Encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# PWM support for LED
CONFIG_PWM=y


# Debounce settings
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Shift Register support
CONFIG_SPI=y
CONFIG_ZMK_GPIO_595=y

# Bluetooth power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
