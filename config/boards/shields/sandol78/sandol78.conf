# Encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# PWM support for LED
CONFIG_PWM=y
CONFIG_ZMK_BACKLIGHT=y

# Matrix scan improvements
CONFIG_ZMK_KSCAN_MATRIX_SCAN_PERIOD_MS=1
CONFIG_ZMK_KSCAN_MATRIX_WAIT_BEFORE_INPUTS_MS=5

# Debounce settings
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Bluetooth power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Free up NFC Pins for GPIO (P0.09 and P0.10 used in Matrix)
CONFIG_NFCT_PINS_AS_GPIOS=y
